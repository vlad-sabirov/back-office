version: '3'

services:
   elastic:
      build:
         context: ../
         dockerfile: ./docker/dev.dockerfile
      restart: "no"
      ports:
         - '3090:9200'
      ulimits:
         memlock:
            soft: -1
            hard: -1
         nofile:
            soft: 65536
            hard: 65536
      environment:
         - discovery.type=single-node
         - bootstrap.memory_lock=true
         - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      env_file:
         - ../../../env/.env.local
         - ../../../env/.env.dev
