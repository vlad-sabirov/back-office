version: '3'

services:
   voip:
      build:
         context: ../../
         dockerfile: ./third_party/docker/dev.dockerfile
      restart: "no"
      ports:
         - '${VOIP_PORT}:3000'
      volumes:
         - ../../:/app/
      env_file:
         - ../../../../env/.env.local
         - ../../../../env/.env.dev
