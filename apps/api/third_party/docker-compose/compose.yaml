version: '3'

services:
  api:
    container_name: ${API_CONTAINER_NAME}
    networks:
      - erp_network

  db_api:
    container_name: ${API_DB_CONTAINER_NAME}
    image: postgres:14.5-alpine
    environment:
      POSTGRES_DB: ${API_DB_DATABASE}
      POSTGRES_USER: ${API_DB_USER}
      POSTGRES_PASSWORD: ${API_DB_PASSWORD}
      PGDATA: ${API_DB_DATA}
      POSTGRES_INITDB_ARGS: ${API_DB_ARGS}
    networks:
      - erp_network
    volumes:
      - ../db/backup/:/app/backup/
      - vol_db_api:/app/data/
    ports:
      - '${API_DB_PORT}:5432'
